      body { margin: 0; padding: 0; background-color: #000; overflow: hidden; touch-action: none; }

      /* Custom scanline effect */
      
      .scanlines {
        background: linear-gradient(
          to bottom,
          rgba(255,255,255,0),
          rgba(255,255,255,0) 50%,
          rgba(0,0,0,0.1) 50%,
          rgba(0,0,0,0.1)
        );
        background-size: 100% 4px;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        pointer-events: none;
        z-index: 50;
      }
      
      /* Landscape enforcement */
      
      #orientation-lock {
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: #000;
        z-index: 9999;
        color: white;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 20px;
      }
      
      /* Show lock screen only on Portrait devices */
      
      @media screen and (orientation: portrait) {
        #orientation-lock { display: flex; }
        #root { display: none; }
      }
    </style>
